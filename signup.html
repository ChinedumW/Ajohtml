<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Treasure Fortune</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #5b21b6, #4c1d95);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .logo span {
            font-size: 28px;
            font-weight: 800;
            color: #5b21b6;
        }

        .auth-header h1 {
            font-size: 28px;
            color: #111827;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #6b7280;
            font-size: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .auth-card {
                padding: 25px;
            }

            .auth-header h1 {
                font-size: 24px;
            }
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: #5b21b6;
            box-shadow: 0 0 0 4px rgba(91, 33, 182, 0.1);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5b21b6, #4c1d95);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(91, 33, 182, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .auth-footer p {
            color: #6b7280;
            font-size: 14px;
        }

        .auth-footer a {
            color: #5b21b6;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }

        .alert.success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon">☪</div>
                    <span>Treasure Fortune</span>
                </div>
                <h1>Create Account</h1>
                <p>Join us to start your financial journey</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" placeholder="Enter phone number" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Create password" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-home"></i>
                        <input type="text" id="address" placeholder="Enter your address" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-city"></i>
                            <input type="text" id="city" placeholder="Enter city" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="state">State *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker"></i>
                            <input type="text" id="state" placeholder="Enter state" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="country">Country *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-globe"></i>
                        <select id="country" required>
                            <option value="">Select Country</option>
                            <option value="Nigeria" selected>Nigeria</option>
                            <option value="Ghana">Ghana</option>
                            <option value="Kenya">Kenya</option>
                            <option value="South Africa">South Africa</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const address = document.getElementById('address').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            const country = document.getElementById('country').value;

            const alertBox = document.getElementById('alert');

            // Validation
            if (!fullName || !email || !phone || !password || !confirmPassword || !address || !city || !state || !country) {
                alertBox.textContent = 'Please fill in all required fields';
                alertBox.className = 'alert error';
                return;
            }

            if (password !== confirmPassword) {
                alertBox.textContent = 'Passwords do not match';
                alertBox.className = 'alert error';
                return;
            }

            if (password.length < 6) {
                alertBox.textContent = 'Password must be at least 6 characters';
                alertBox.className = 'alert error';
                return;
            }

            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('treasureFortuneUsers') || '[]');
            if (users.find(u => u.email === email)) {
                alertBox.textContent = 'Email already registered';
                alertBox.className = 'alert error';
                return;
            }

            // Create new user - initially hasPaidRegistration is false
            const newUser = {
                id: Date.now(),
                name: fullName,
                email: email,
                phone: phone,
                password: password,
                address: address,
                city: city,
                state: state,
                country: country,
                hasPaidRegistration: false,
                registrationStatus: 'unpaid',
                registrationDate: null,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('treasureFortuneUsers', JSON.stringify(users));

            // Store pending user info for payment reference
            localStorage.setItem('treasureFortunePendingUser', JSON.stringify(newUser));

            // Show success and redirect to payment
            alertBox.textContent = 'Account created! Redirecting to payment...';
            alertBox.className = 'alert success';

            setTimeout(() => {
                window.location.href = 'pay.html';
            }, 1500);
        });
    </script>
</body>
</html>
