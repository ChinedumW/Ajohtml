<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Treasure Fortune</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #5b21b6;
            --primary-dark: #4c1d95;
            --primary-light: #6d28d9;
            --primary-lighter: #ddd6fe;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .admin-header {
            background: var(--primary-color);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }

        .admin-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Content */
        .admin-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .summary-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .summary-icon.total {
            background: #e0e7ff;
            color: var(--primary-color);
        }

        .summary-icon.pending {
            background: #fef3c7;
            color: var(--warning-color);
        }

        .summary-icon.approved {
            background: #d1fae5;
            color: var(--success-color);
        }

        .summary-icon.rejected {
            background: #fee2e2;
            color: var(--danger-color);
        }

        .summary-info h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
        }

        /* Requests Section */
        .requests-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--primary-color);
            color: white;
        }

        /* Filter header row */
        .filter-header-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Type filter */
        .type-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .type-tab {
            padding: 6px 12px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .type-tab.active {
            background: var(--primary-subtle, #ede9fe);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-tab:hover:not(.active) {
            background: #f3f4f6;
        }

        /* Requests Table */
        .requests-table {
            width: 100%;
            border-collapse: collapse;
        }

        .requests-table th,
        .requests-table td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        .requests-table th {
            background: #f9fafb;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .requests-table tr:hover {
            background: #f9fafb;
        }

        .request-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .request-name {
            font-weight: 600;
        }

        .request-email {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .amount {
            font-weight: 600;
            font-size: 16px;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Method Badge */
        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-approve {
            background: var(--success-color);
            color: white;
        }

        .btn-approve:hover {
            background: #059669;
        }

        .btn-reject {
            background: var(--danger-color);
            color: white;
        }

        .btn-reject:hover {
            background: #dc2626;
        }

        .btn-view {
            background: var(--primary-color);
            color: white;
        }

        .btn-view:hover {
            background: var(--primary-dark);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #d1d5db;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
        }

        .receipt-preview {
            width: 100%;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .receipt-preview img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .receipt-placeholder {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .receipt-placeholder i {
            font-size: 48px;
            margin-bottom: 12px;
            color: #d1d5db;
        }

        .request-details {
            display: grid;
            gap: 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 500;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
        }

        .toast {
            background: var(--text-primary);
            color: white;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--danger-color);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .requests-table {
                display: none;
            }

            .admin-header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .summary-cards {
                grid-template-columns: 1fr 1fr;
            }

            /* Card Layout for Mobile */
            .requests-cards {
                display: flex;
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }

            .request-card {
                background: white;
                border-radius: var(--radius-lg);
                padding: 20px;
                box-shadow: var(--shadow-sm);
                border: 1px solid #e5e7eb;
            }

            .request-card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
            }

            .request-card-user {
                font-weight: 600;
                font-size: 16px;
                color: var(--text-primary);
            }

            .request-card-email {
                font-size: 12px;
                color: var(--text-secondary);
                margin-top: 2px;
            }

            .request-card-body {
                display: grid;
                gap: 12px;
                margin-bottom: 16px;
            }

            .request-card-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .request-card-label {
                font-size: 13px;
                color: var(--text-secondary);
            }

            .request-card-value {
                font-weight: 500;
                font-size: 14px;
            }

            .request-card-amount {
                font-size: 18px;
                font-weight: 700;
                color: var(--primary-color);
            }

            .request-card-actions {
                display: flex;
                gap: 8px;
            }

            .request-card-actions .btn {
                flex: 1;
                justify-content: center;
                padding: 12px 16px;
            }

            .section-header {
                flex-direction: column;
                gap: 12px;
            }

            .filter-header-row {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .type-filter, .filter-tabs {
                justify-content: center;
            }

            .admin-content {
                padding: 16px;
            }

            .summary-cards {
                gap: 12px;
            }

            .summary-card {
                padding: 16px;
            }

            .summary-value {
                font-size: 22px;
            }

            /* Modal Responsive */
            .modal-overlay.active {
                align-items: flex-end;
            }

            .modal-content {
                width: 100%;
                max-width: 100%;
                max-height: 95vh;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                margin-bottom: 0;
            }

            .modal-body {
                padding: 16px;
            }

            .receipt-preview {
                max-height: 300px;
            }

            .modal-footer {
                flex-direction: column-reverse;
                padding: 16px;
            }

            .modal-footer .btn {
                width: 100%;
                justify-content: center;
                padding: 14px;
            }
        }

        @media (min-width: 769px) {
            .requests-cards {
                display: none;
            }
        }

        /* Button Hover Effects */
        .btn {
            transition: all 0.2s ease;
        }

        .btn-approve {
            background: var(--success-color);
            color: white;
        }

        .btn-approve:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-reject {
            background: var(--danger-color);
            color: white;
        }

        .btn-reject:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn-view {
            background: var(--primary-color);
            color: white;
        }

        .btn-view:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(91, 33, 182, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* No Receipt Warning */
        .no-receipt-warning {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: var(--radius-md);
            color: #92400e;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .no-receipt-warning i {
            color: #f59e0b;
        }

        /* Loading State */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1><i class="fas fa-shield-alt"></i> Admin Dashboard</h1>
            <a href="index.html" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.8;"><i class="fas fa-home"></i> View Website</a>
        </div>
        <div class="header-actions">
            <button class="refresh-btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="refresh-btn" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-content">
        <!-- Users Section -->
        <div class="requests-section" style="margin-bottom: 30px;">
            <div class="section-header">
                <h2>Registered Users</h2>
            </div>
            <div id="usersContainer">
                <p style="padding: 20px; color: var(--text-secondary);">Loading users...</p>
            </div>
        </div>
        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-icon total">
                    <i class="fas fa-list"></i>
                </div>
                <div class="summary-info">
                    <h3>Total Requests</h3>
                    <div class="summary-value" id="totalCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="summary-info">
                    <h3>Pending</h3>
                    <div class="summary-value" id="pendingCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon approved">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="summary-info">
                    <h3>Approved</h3>
                    <div class="summary-value" id="approvedCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon rejected">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="summary-info">
                    <h3>Rejected</h3>
                    <div class="summary-value" id="rejectedCount">0</div>
                </div>
            </div>
        </div>

        <!-- Requests Section -->
        <div class="requests-section">
            <div class="section-header">
                <h2>Transaction Requests</h2>
                <div class="filter-header-row">
                    <div class="type-filter">
                        <button class="type-tab active" onclick="filterByType('all')" data-type="all">All Types</button>
                        <button class="type-tab" onclick="filterByType('Top-up')" data-type="Top-up">Wallet Top-up</button>
                        <button class="type-tab" onclick="filterByType('Loan Repayment')" data-type="Loan Repayment">Loan Repayment</button>
                        <button class="type-tab" onclick="filterByType('Savings')" data-type="Savings">Savings</button>
                    </div>
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterRequests('all')">All</button>
                        <button class="filter-tab" onclick="filterRequests('Pending')">Pending</button>
                        <button class="filter-tab" onclick="filterRequests('Approved')">Approved</button>
                        <button class="filter-tab" onclick="filterRequests('Rejected')">Rejected</button>
                    </div>
                </div>
            </div>

            <div id="requestsContainer">
                <!-- Requests will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Payment Receipt</h2>
                <button class="modal-close" onclick="closeReceiptModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="request-details" style="margin-bottom: 20px;">
                    <div class="detail-row">
                        <span class="detail-label">User</span>
                        <span class="detail-value" id="receiptUserName">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Type</span>
                        <span class="detail-value" id="receiptType">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Amount</span>
                        <span class="detail-value" id="receiptAmount">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date</span>
                        <span class="detail-value" id="receiptDate">-</span>
                    </div>
                </div>
                <div class="receipt-preview" id="receiptPreview">
                    <div class="receipt-placeholder" id="noReceiptMsg" style="display: none;">
                        <i class="fas fa-file-image"></i>
                        <p id="receiptFileName">No receipt uploaded</p>
                    </div>
                    <img id="receiptImage" style="max-width: 100%; max-height: 400px; border-radius: 8px; display: none;" alt="Receipt">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-reject" id="rejectBtn" onclick="quickReject()">
                    <i class="fas fa-times"></i> Reject
                </button>
                <button class="btn btn-approve" id="approveBtn" onclick="quickApprove()">
                    <i class="fas fa-check"></i> Approve
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Admin Login Check
        const isAdminLoggedIn = localStorage.getItem('isAdminLoggedIn');
        if (!isAdminLoggedIn) {
            window.location.href = 'admin-login.html';
        }

        // Global state
        let requests = [];
        let currentFilter = 'all';
        let currentType = 'all';
        let selectedRequest = null;
        let currentPendingId = null;

        // Load requests on page load
        document.addEventListener('DOMContentLoaded', function() {
            try {
                loadRequests();
            } catch(e) {
                console.error('Error loading requests:', e);
            }
            try {
                loadUsers();
            } catch(e) {
                console.error('Error loading users:', e);
            }
        });

        // Load registered users
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('treasureFortuneUsers') || '[]');
            const container = document.getElementById('usersContainer');
            
            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <h3>No Users Yet</h3>
                        <p>Users will appear here after registration.</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="requests-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Registration Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>

        // Load requests from localStorage (both adminRequests and treasureFortunePayments)
        function loadRequests() {
            // Load from multiple sources
            const stored1 = localStorage.getItem('adminRequests');
            const stored2 = localStorage.getItem('treasureFortunePayments');
            const req1 = stored1 ? JSON.parse(stored1) : [];
            const req2 = stored2 ? JSON.parse(stored2) : [];
            
            // Add type to old requests if missing
            req1.forEach(r => {
                if (!r.type) r.type = r.requestType || 'Registration';
            });
            
            // Mark registration payments
            req2.forEach(r => {
                r.type = 'Registration Payment';
                r.requestType = 'Registration';
            });
            
            requests = [...req1, ...req2];
            
            // Sort by date (newest first)
            requests.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            updateSummary();
            renderRequests();
        }

        // Update summary cards
        function updateSummary() {
            const total = requests.length;
            const pending = requests.filter(r => r.status === 'Pending').length;
            const approved = requests.filter(r => r.status === 'Approved').length;
            const rejected = requests.filter(r => r.status === 'Rejected').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
            document.getElementById('rejectedCount').textContent = rejected;
        }

            document.querySelectorAll('.filter-tab').forEach(tab => {

        // View receipt - opens modal to see request details and image
        function viewReceipt(requestId) {
            const request = requests.find(r => r.id === requestId);
            if (!request) return;

            selectedRequest = request;
            currentPendingId = request.id;

            document.getElementById('receiptUserName').textContent = request.userName || 'Unknown';
            document.getElementById('receiptType').textContent = request.type || 'Unknown';
            document.getElementById('receiptAmount').textContent = `₦${(request.amount || 0).toLocaleString()}`;
            document.getElementById('receiptDate').textContent = request.date ? new Date(request.date).toLocaleDateString() : 'Unknown';
            
            // Debug: show request ID
            console.log('Viewing request ID:', request.id, 'Type:', request.type, 'Receipt length:', (request.receipt || '').length);
            
            const preview = document.getElementById('receiptPreview');
            const approveBtn = document.getElementById('approveBtn');
            const rejectBtn = document.getElementById('rejectBtn');
            
            // Check for receipt data - be very lenient
            let receiptData = request.receipt || '';
            let hasReceipt = false;
            let imgSrc = '';
            
            // Debug receipt
            const receiptLen = receiptData ? receiptData.length : 0;
            console.log('Receipt debug - length:', receiptLen, 'starts:', receiptData ? receiptData.substring(0,30) : 'none');
            
            // Accept ANY receipt data from 50 chars
            if (receiptData && receiptLen > 50) {
                hasReceipt = true;
                receiptData = receiptData.trim();
                
                // Check what kind of data
                if (receiptData.startsWith('data:image')) {
                    imgSrc = receiptData;
                } else if (receiptData.startsWith('http')) {
                    imgSrc = receiptData;
                } else {
                    // Try as base64 - add prefix
                    imgSrc = 'data:image/jpeg;base64,' + receiptData;
                }
            }
            
            // Show/hide buttons based on status
            const isPending = request.status === 'Pending';
            
            approveBtn.style.display = isPending ? 'flex' : 'none';
            rejectBtn.style.display = isPending ? 'flex' : 'none';
            
            if (isPending) {
                // Allow admin to approve even without receipt (for card payments or manual verification)
                approveBtn.disabled = false;
                approveBtn.title = 'Click to approve this request';
                if (hasReceipt) {
                    approveBtn.innerHTML = '<i class="fas fa-check"></i> Approve with Receipt';
                } else {
                    approveBtn.innerHTML = '<i class="fas fa-check"></i> Approve Request';
                }
            }
            
            // Try to display the receipt image
            if (hasReceipt && imgSrc) {
                preview.innerHTML = `
                    <div style="text-align:center;padding:10px;">
                        <img id="receiptImg" src="${imgSrc}" alt="Receipt Image" 
                            style="max-width:100%;max-height:350px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);"
                            onload="console.log('Image loaded successfully')"
                            onerror="console.log('Image failed to load'); this.style.display='none'; document.getElementById('receiptError').style.display='block';">
                        <div id="receiptError" style="display:none;padding:20px;text-align:center;background:#fee2e2;border-radius:8px;margin-top:10px;">
                            <i class="fas fa-exclamation-triangle" style="font-size:32px;color:#dc2626;"></i>
                            <p style="color:#991b1b;margin-top:8px;">Could not load receipt image</p>
                            <p style="color:#991b1b;font-size:12px;">Receipt data length: ${receiptData.length}</p>
                        </div>
                    </div>
                `;
            } else {
                // Show placeholder even if no image, but let user see it's a bank transfer
                const method = request.method || '';
                const isBank = method.toLowerCase().includes('bank');
                preview.innerHTML = `
                    <div class="receipt-placeholder" style="padding:40px;text-align:center;">
                        <i class="fas fa-file-image" style="font-size:64px;color:#d1d5db;"></i>
                        <p style="font-size:16px;font-weight:600;margin-top:12px;">${isBank ? 'Bank Transfer - Pending Review' : 'No Receipt Image'}</p>
                        <p style="font-size:13px;color:#6b7280;margin-top:8px;">${isBank ? 'User transferred - verify and approve' : 'Card payment - autoapproved'}</p>
                        <div style="margin-top:20px;padding:15px;background:#fef3c7;border-radius:8px;">
                            <i class="fas fa-info-circle" style="color:#d97706;"></i>
                            <p style="color:#92400e;font-size:13px;margin-top:5px;">Review this request and click Approve if payment is confirmed</p>
                        </div>
                    </div>
                `;
            }

            // Clean up any warning message
            const existingWarning = document.getElementById('noReceiptWarning');
            if (existingWarning) existingWarning.remove();
            
            // Add warning message if no receipt
            const modalBody = document.querySelector('.modal-body');
            if (isPending && !hasReceipt) {
                const warningDiv = document.createElement('div');
                warningDiv.id = 'noReceiptWarning';
                warningDiv.className = 'no-receipt-warning';
                warningDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> <span><strong>Warning:</strong> No receipt uploaded. Please ask user to upload proof of payment before approving.</span>';
                modalBody.insertBefore(warningDiv, preview);
            }

            document.getElementById('receiptModal').classList.add('active');
        }

        // Close receipt modal
        function closeReceiptModal() {
            document.getElementById('receiptModal').classList.remove('active');
            selectedRequest = null;
            currentPendingId = null;
            
            // Clean up any warning message
            const warning = document.getElementById('noReceiptWarning');
            if (warning) warning.remove();
        }

        // Open approve modal (from receipt view)
        function openApproveModal(requestId) {
            approveRequest(requestId);
        }

        // Open reject modal (from receipt view)
        function openRejectModal(requestId) {
            rejectRequest(requestId);
        }

        // Approve request
        function approveRequest(requestId) {
            // Try parameter first, then selectedRequest object in modal
            let id = requestId;
            if (!id && selectedRequest && selectedRequest.id) id = selectedRequest.id;
            if (!id) { /* Try button ID from click */ id = parseInt(this.getAttribute('data-id')); }
            if (!id) { /* Try from viewReceipt */ id = currentPendingId; }
            
            if (!id) {
                // Last resort - get first pending
                loadRequests();
                const all = [...requests, ...JSON.parse(localStorage.getItem('treasureFortunePayments')||'[]')];
                const pending = all.find(x => x && x.status === 'Pending');
                if (pending) id = pending.id;
            }
            
            if (id) {
                // Approve logic
                const payments = JSON.parse(localStorage.getItem('treasureFortunePayments') || '[]');
                const request = requests.find(r => r.id === id) || payments.find(p => p.id === id);
                if (request && request.status === 'Pending') {
                    request.status = 'Approved';
                    localStorage.setItem('adminRequests', JSON.stringify(requests));
                    const payIdx = payments.findIndex(p => p.id === id);
                    if (payIdx >= 0) { payments[payIdx].status = 'Approved'; localStorage.setItem('treasureFortunePayments', JSON.stringify(payments)); }
                    updateUserBalance(request);
                    updateUserTransaction(id, 'Approved');
                    closeReceiptModal();
                    updateSummary();
                    renderRequests();
                    showToast('success', 'Approved', 'Request approved');
                    return;
                }
            }
            // Default fallback
            alert('Please open a request first using View button');
        }

        // Update user's balance based on request type
        function updateUserBalance(request) {
            // Handle Registration Payment - update user status
            if (request.type === 'Registration Payment' || request.requestType === 'Registration') {
                const users = JSON.parse(localStorage.getItem('treasureFortuneUsers') || '[]');
                const userIndex = users.findIndex(u => u.email === request.userEmail);
                
                if (userIndex >= 0) {
                    users[userIndex].hasPaidRegistration = true;
                    users[userIndex].registrationStatus = 'Approved';
                    users[userIndex].registrationDate = new Date().toISOString();
                    localStorage.setItem('treasureFortuneUsers', JSON.stringify(users));
                }
                return;
            }
            
            // Try to get user state from the app - we'll find by user email
            const allStates = localStorage.getItem('treasureFortuneState');
            if (!allStates) return;
            
            const state = JSON.parse(allStates);
            
            // Ensure whole naira amount
            const amount = Math.floor(request.amount);
            
            // Handle different transaction types (case insensitive)
            const type = request.type || '';
            const typeLower = type.toLowerCase();
            
            if (typeLower === 'topup' || typeLower === 'top-up' || typeLower === 'wallet topup') {
                // Add to wallet
                state.wallet = (state.wallet || 0) + amount;
            } else if (typeLower === 'payment' || typeLower === 'loan repayment' || typeLower === 'repayment') {
                // Add to loan paid (negative amount means payment towards loan)
                state.loan = state.loan || { amount: 0, paid: 0 };
                state.loan.paid = (state.loan.paid || 0) + Math.abs(amount);
            } else if (typeLower === 'savings' || typeLower === 'savings deposit') {
                // Add to savings
                state.savings = (state.savings || 0) + amount;
            } else if (typeLower === 'loan' || typeLower === 'loan request') {
                // Create new loan for user
                state.loan = state.loan || { amount: 0, paid: 0 };
                state.loan.amount = amount;
                state.loan.paid = 0;
            }
            
            localStorage.setItem('treasureFortuneState', JSON.stringify(state));
        }

        // Reject request
        function rejectRequest(requestId) {
            if (!selectedRequest) { alert('No request selected. Please click View first.'); return; }
            const id = selectedRequest.id;
            
            loadRequests();
            const payments = JSON.parse(localStorage.getItem('treasureFortunePayments') || '[]');
            let request = requests.find(r => r.id === id) || payments.find(p => p.id === id);
            
            if (!request) { alert('Request not found'); return; }
            if (request.status !== 'Pending') { alert('Already processed'); return; }
            
            request.status = 'Rejected';
            
            localStorage.setItem('adminRequests', JSON.stringify(requests));
            const payIdx = payments.findIndex(p => p.id === id);
            if (payIdx >= 0) { payments[payIdx].status = 'Rejected'; localStorage.setItem('treasureFortunePayments', JSON.stringify(payments)); }
            
            updateUserTransaction(id, 'Rejected');
            
            closeReceiptModal();
            updateSummary();
            renderRequests();
            showToast('error', 'Rejected', 'Request rejected');
        }

        // OLD reject - keeping for reference
        function rejectRequestOLD(requestId) {
            const id = requestId || (selectedRequest ? selectedRequest.id : null);
            if (!id) return;

            const request = requests.find(r => r.id === id);
            if (!request || request.status !== 'Pending') return;

            // Update status
            request.status = 'Rejected';
            // Save to both storage locations
            localStorage.setItem('adminRequests', JSON.stringify(requests));
            const payments = JSON.parse(localStorage.getItem('treasureFortunePayments') || '[]');
            const payIndex = payments.findIndex(p => p.id === id);
            if (payIndex >= 0) {
                payments[payIndex].status = 'Rejected';
                localStorage.setItem('treasureFortunePayments', JSON.stringify(payments));
            }

            // Update transaction in user's localStorage
            updateUserTransaction(id, 'Rejected');

            closeReceiptModal();
            updateSummary();
            renderRequests();

            showToast('error', 'Request Rejected', `The ${request.type.toLowerCase()} request has been rejected`);
        }

        // Update user's transaction
        function updateUserTransaction(requestId, status) {
            const userState = localStorage.getItem('treasureFortuneState');
            if (!userState) return;

            const state = JSON.parse(userState);
            
            if (state.transactions) {
                const transaction = state.transactions.find(t => t.id === requestId);
                if (transaction) {
                    transaction.status = status;
                }
            }
            
            localStorage.setItem('treasureFortuneState', JSON.stringify(state));
        }

        // Refresh data
        function refreshData() {
            loadRequests();
            loadUsers();
            showToast('success', 'Refreshed', 'Data loaded successfully');
        }

        // Quick approve - uses currently selected request from modal
        function quickApprove() {
            if (!selectedRequest) {
                // Fallback: find first pending from any source
                loadRequests();
                const pending = requests.find(r => r && r.status === 'Pending');
                if (!pending) {
                    const payments = JSON.parse(localStorage.getItem('treasureFortunePayments') || '[]');
                    if (payments.length > 0 && payments[0].status === 'Pending') {
                        approveAnyRequest(payments[0]);
                        return;
                    }
                    alert('No pending requests to approve');
                    return;
                }
                selectedRequest = pending;
            }
            
            if (selectedRequest) {
                approveAnyRequest(selectedRequest);
            }
        }

        // Helper to approve any request type
        function approveAnyRequest(req) {
            const id = req.id;
            const type = req.type || '';
            const userEmail = req.userEmail;
            
            // Update status in adminRequests
            let adminReqs = JSON.parse(localStorage.getItem('adminRequests') || '[]');
            const aIdx = adminReqs.findIndex(r => r.id === id);
            if (aIdx >= 0) {
                adminReqs[aIdx].status = 'Approved';
                localStorage.setItem('adminRequests', JSON.stringify(adminReqs));
            }
            
            // Update in treasureFortunePayments
            let payments = JSON.parse(localStorage.getItem('treasureFortunePayments') || '[]');
            const pIdx = payments.findIndex(p => p.id === id);
            if (pIdx >= 0) {
                payments[pIdx].status = 'Approved';
                localStorage.setItem('treasureFortunePayments', JSON.stringify(payments));
            }
            
            // Update registration status if registration payment
            if (type.toLowerCase().includes('registration')) {
                let users = JSON.parse(localStorage.getItem('treasureFortuneUsers') || '[]');
                let u = users.find(x => x.email === userEmail);
                if (u) { 
                    u.hasPaidRegistration = true; 
                    u.registrationStatus = 'Approved'; 
                    localStorage.setItem('treasureFortuneUsers', JSON.stringify(users)); 
                }
            }
            
            // Update user balances for other transaction types
            updateUserBalance(req);
            
            showToast('success', 'Approved', type + ' request approved');
            selectedRequest = null;
            closeReceiptModal();
            refreshData();
        }

        // Quick reject - uses currently selected request
        function quickReject() {
            if (!selectedRequest) {
                // Fallback: find first pending
                loadRequests();
                const pending = requests.find(r => r && r.status === 'Pending');
                if (pending) selectedRequest = pending;
                else { alert('No pending requests'); return; }
            }
            
            if (selectedRequest) {
                const id = selectedRequest.id;
                const type = selectedRequest.type;
                
                // Update in adminRequests
                let adminReqs = JSON.parse(localStorage.getItem('adminRequests') || '[]');
                const aIdx = adminReqs.findIndex(r => r.id === id);
                if (aIdx >= 0) {
                    adminReqs[aIdx].status = 'Rejected';
                    localStorage.setItem('adminRequests', JSON.stringify(adminReqs));
                }
                
                // Update in treasureFortunePayments
                let payments = JSON.parse(localStorage.getItem('treasureFortunePayments') || '[]');
                const pIdx = payments.findIndex(p => p.id === id);
                if (pIdx >= 0) {
                    payments[pIdx].status = 'Rejected';
                    localStorage.setItem('treasureFortunePayments', JSON.stringify(payments));
                }
                
                showToast('error', 'Rejected', type + ' request rejected');
                selectedRequest = null;
                closeReceiptModal();
                refreshData();
            }
        }

        // Show toast
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <div>
                    <strong>${title}</strong>
                    <p style="font-size: 12px; opacity: 0.9;">${message}</p>
                </div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 4000);
        }
    </script>
</body>
</html>
