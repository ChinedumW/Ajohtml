<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Treasure Fortune</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #5b21b6;
            --primary-dark: #4c1d95;
            --primary-light: #6d28d9;
            --primary-lighter: #ddd6fe;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .admin-header {
            background: var(--primary-color);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }

        .admin-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Main Content */
        .admin-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .summary-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .summary-icon.total {
            background: #e0e7ff;
            color: var(--primary-color);
        }

        .summary-icon.pending {
            background: #fef3c7;
            color: var(--warning-color);
        }

        .summary-icon.approved {
            background: #d1fae5;
            color: var(--success-color);
        }

        .summary-icon.rejected {
            background: #fee2e2;
            color: var(--danger-color);
        }

        .summary-info h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
        }

        /* Requests Section */
        .requests-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--primary-color);
            color: white;
        }

        /* Filter header row */
        .filter-header-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Type filter */
        .type-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .type-tab {
            padding: 6px 12px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .type-tab.active {
            background: var(--primary-subtle, #ede9fe);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-tab:hover:not(.active) {
            background: #f3f4f6;
        }

        /* Requests Table */
        .requests-table {
            width: 100%;
            border-collapse: collapse;
        }

        .requests-table th,
        .requests-table td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        .requests-table th {
            background: #f9fafb;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .requests-table tr:hover {
            background: #f9fafb;
        }

        .request-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .request-name {
            font-weight: 600;
        }

        .request-email {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .amount {
            font-weight: 600;
            font-size: 16px;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Method Badge */
        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-approve {
            background: var(--success-color);
            color: white;
        }

        .btn-approve:hover {
            background: #059669;
        }

        .btn-reject {
            background: var(--danger-color);
            color: white;
        }

        .btn-reject:hover {
            background: #dc2626;
        }

        .btn-view {
            background: var(--primary-color);
            color: white;
        }

        .btn-view:hover {
            background: var(--primary-dark);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #d1d5db;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
        }

        .receipt-preview {
            width: 100%;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .receipt-preview img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .receipt-placeholder {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .receipt-placeholder i {
            font-size: 48px;
            margin-bottom: 12px;
            color: #d1d5db;
        }

        .request-details {
            display: grid;
            gap: 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 500;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
        }

        .toast {
            background: var(--text-primary);
            color: white;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--danger-color);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .requests-table {
                display: block;
                overflow-x: auto;
            }

            .admin-header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .summary-cards {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <h1><i class="fas fa-shield-alt"></i> Admin Dashboard</h1>
        <div class="header-actions">
            <button class="refresh-btn" onclick="loadRequests()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-content">
        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-icon total">
                    <i class="fas fa-list"></i>
                </div>
                <div class="summary-info">
                    <h3>Total Requests</h3>
                    <div class="summary-value" id="totalCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="summary-info">
                    <h3>Pending</h3>
                    <div class="summary-value" id="pendingCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon approved">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="summary-info">
                    <h3>Approved</h3>
                    <div class="summary-value" id="approvedCount">0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon rejected">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="summary-info">
                    <h3>Rejected</h3>
                    <div class="summary-value" id="rejectedCount">0</div>
                </div>
            </div>
        </div>

        <!-- Requests Section -->
        <div class="requests-section">
            <div class="section-header">
                <h2>Transaction Requests</h2>
                <div class="filter-header-row">
                    <div class="type-filter">
                        <button class="type-tab active" onclick="filterByType('all')" data-type="all">All Types</button>
                        <button class="type-tab" onclick="filterByType('Top-up')" data-type="Top-up">Wallet Top-up</button>
                        <button class="type-tab" onclick="filterByType('Loan Repayment')" data-type="Loan Repayment">Loan Repayment</button>
                        <button class="type-tab" onclick="filterByType('Savings')" data-type="Savings">Savings</button>
                    </div>
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterRequests('all')">All</button>
                        <button class="filter-tab" onclick="filterRequests('Pending')">Pending</button>
                        <button class="filter-tab" onclick="filterRequests('Approved')">Approved</button>
                        <button class="filter-tab" onclick="filterRequests('Rejected')">Rejected</button>
                    </div>
                </div>
            </div>

            <div id="requestsContainer">
                <!-- Requests will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Payment Receipt</h2>
                <button class="modal-close" onclick="closeReceiptModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="request-details" style="margin-bottom: 20px;">
                    <div class="detail-row">
                        <span class="detail-label">User</span>
                        <span class="detail-value" id="receiptUserName">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Type</span>
                        <span class="detail-value" id="receiptType">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Amount</span>
                        <span class="detail-value" id="receiptAmount">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date</span>
                        <span class="detail-value" id="receiptDate">-</span>
                    </div>
                </div>
                <div class="receipt-preview" id="receiptPreview">
                    <div class="receipt-placeholder">
                        <i class="fas fa-file-image"></i>
                        <p id="receiptFileName">No receipt file</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-reject" id="rejectBtn" onclick="rejectRequest()">
                    <i class="fas fa-times"></i> Reject
                </button>
                <button class="btn btn-approve" id="approveBtn" onclick="approveRequest()">
                    <i class="fas fa-check"></i> Approve
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Global state
        let requests = [];
        let currentFilter = 'all';
        let currentType = 'all';
        let selectedRequest = null;

        // Load requests on page load
        document.addEventListener('DOMContentLoaded', loadRequests);

        // Load requests from localStorage
        function loadRequests() {
            const stored = localStorage.getItem('adminRequests');
            requests = stored ? JSON.parse(stored) : [];
            
            // Sort by date (newest first)
            requests.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            updateSummary();
            renderRequests();
        }

        // Update summary cards
        function updateSummary() {
            const total = requests.length;
            const pending = requests.filter(r => r.status === 'Pending').length;
            const approved = requests.filter(r => r.status === 'Approved').length;
            const rejected = requests.filter(r => r.status === 'Rejected').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
            document.getElementById('rejectedCount').textContent = rejected;
        }

        // Filter requests
        function filterRequests(status) {
            currentFilter = status;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent.toLowerCase() === status.toLowerCase());
                if (status === 'all' && tab.textContent === 'All') {
                    tab.classList.add('active');
                }
            });

            renderRequests();
        }

        // Filter by type
        function filterByType(type) {
            currentType = type;
            
            document.querySelectorAll('.type-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.type === type);
            });

            renderRequests();
        }

        // Render requests table
        function renderRequests() {
            const container = document.getElementById('requestsContainer');
            
            let filtered = requests;
            
            // Filter by status
            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.status === currentFilter);
            }
            
            // Filter by type
            if (currentType !== 'all') {
                filtered = filtered.filter(r => r.type === currentType);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No requests found</h3>
                        <p>There are no ${currentFilter === 'all' ? '' : currentFilter.toLowerCase()} ${currentType !== 'all' ? currentType.toLowerCase() : ''} requests at the moment.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table class="requests-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            filtered.forEach(request => {
                const date = new Date(request.date).toLocaleDateString('en-US', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });

                const statusClass = request.status.toLowerCase();
                const statusBadge = `
                    <span class="status-badge ${statusClass}">
                        ${request.status === 'Pending' ? '<i class="fas fa-clock"></i>' : ''}
                        ${request.status === 'Approved' ? '<i class="fas fa-check"></i>' : ''}
                        ${request.status === 'Rejected' ? '<i class="fas fa-times"></i>' : ''}
                        ${request.status}
                    </span>
                `;

                const actions = `
                    <div class="action-buttons">
                        ${request.receipt ? `
                            <button class="btn btn-view" onclick="viewReceipt(${request.id})">
                                <i class="fas fa-eye"></i>
                            </button>
                        ` : ''}
                        ${request.status === 'Pending' ? `
                            <button class="btn btn-approve" onclick="openApproveModal(${request.id})">
                                <i class="fas fa-check"></i>
                            </button>
                            <button class="btn btn-reject" onclick="openRejectModal(${request.id})">
                                <i class="fas fa-times"></i>
                            </button>
                        ` : ''}
                    </div>
                `;

                html += `
                    <tr>
                        <td>
                            <div class="request-info">
                                <span class="request-name">${request.userName}</span>
                                <span class="request-email">${request.userEmail || '-'}</span>
                            </div>
                        </td>
                        <td>${request.type}</td>
                        <td><span class="amount">₦${request.amount.toLocaleString()}</span></td>
                        <td>
                            <span class="method-badge">
                                <i class="fas fa-university"></i>
                                ${request.method}
                            </span>
                        </td>
                        <td>${date}</td>
                        <td>${statusBadge}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // View receipt
        function viewReceipt(requestId) {
            const request = requests.find(r => r.id === requestId);
            if (!request) return;

            selectedRequest = request;

            document.getElementById('receiptUserName').textContent = request.userName;
            document.getElementById('receiptType').textContent = request.type;
            document.getElementById('receiptAmount').textContent = `₦${request.amount.toLocaleString()}`;
            document.getElementById('receiptDate').textContent = new Date(request.date).toLocaleDateString();
            
            // Show receipt image if available
            const preview = document.getElementById('receiptPreview');
            
            // Debug: log what's in receipt
            console.log('Receipt data:', request.receipt ? request.receipt.substring(0, 50) : 'empty');
            
            if (request.receipt && request.receipt.startsWith('data:image')) {
                preview.innerHTML = `<img src="${request.receipt}" alt="Receipt" style="max-width:100%;max-height:400px;">`;
            } else if (request.receipt && request.receipt.length > 100) {
                // Might be base64 but without data:image prefix
                preview.innerHTML = `<img src="${request.receipt}" alt="Receipt" style="max-width:100%;max-height:400px;">`;
            } else {
                preview.innerHTML = `
                    <div class="receipt-placeholder">
                        <i class="fas fa-file-image"></i>
                        <p>${request.receipt ? 'Receipt: ' + request.receipt.substring(0, 30) + '...' : 'No receipt uploaded'}</p>
                    </div>
                `;
            }

            // Show/hide buttons based on status
            document.getElementById('approveBtn').style.display = request.status === 'Pending' ? 'flex' : 'none';
            document.getElementById('rejectBtn').style.display = request.status === 'Pending' ? 'flex' : 'none';

            document.getElementById('receiptModal').classList.add('active');
        }

        // Close receipt modal
        function closeReceiptModal() {
            document.getElementById('receiptModal').classList.remove('active');
            selectedRequest = null;
        }

        // Open approve modal (from receipt view)
        function openApproveModal(requestId) {
            approveRequest(requestId);
        }

        // Open reject modal (from receipt view)
        function openRejectModal(requestId) {
            rejectRequest(requestId);
        }

        // Approve request
        function approveRequest(requestId) {
            const id = requestId || (selectedRequest ? selectedRequest.id : null);
            if (!id) return;

            const request = requests.find(r => r.id === id);
            if (!request || request.status !== 'Pending') return;

            // Update status
            request.status = 'Approved';
            localStorage.setItem('adminRequests', JSON.stringify(requests));

            // Update actual user balance in localStorage
            updateUserBalance(request);

            // Update transaction in user's localStorage
            updateUserTransaction(id, 'Approved');

            closeReceiptModal();
            updateSummary();
            renderRequests();

            showToast('success', 'Request Approved', `The ${request.type.toLowerCase()} request has been approved and balance updated`);
        }

        // Update user's balance based on request type
        function updateUserBalance(request) {
            // Try to get user state from the app - we'll find by user email
            const allStates = localStorage.getItem('treasureFortuneState');
            if (!allStates) return;
            
            const state = JSON.parse(allStates);
            
            // Ensure whole naira amount
            const amount = Math.floor(request.amount);
            
            if (request.type === 'Top-up') {
                // Add to wallet
                state.wallet = (state.wallet || 0) + amount;
            } else if (request.type === 'Loan Repayment') {
                // Add to loan paid
                state.loan = state.loan || { amount: 0, paid: 0 };
                state.loan.paid = (state.loan.paid || 0) + amount;
            } else if (request.type === 'Savings') {
                // Add to savings
                state.savings = (state.savings || 0) + amount;
            }
            
            localStorage.setItem('treasureFortuneState', JSON.stringify(state));
        }

        // Reject request
        function rejectRequest(requestId) {
            const id = requestId || (selectedRequest ? selectedRequest.id : null);
            if (!id) return;

            const request = requests.find(r => r.id === id);
            if (!request || request.status !== 'Pending') return;

            // Update status
            request.status = 'Rejected';
            localStorage.setItem('adminRequests', JSON.stringify(requests));

            // Update transaction in user's localStorage
            updateUserTransaction(id, 'Rejected');

            closeReceiptModal();
            updateSummary();
            renderRequests();

            showToast('error', 'Request Rejected', `The ${request.type.toLowerCase()} request has been rejected`);
        }

        // Update user's transaction
        function updateUserTransaction(requestId, status) {
            const userState = localStorage.getItem('treasureFortuneState');
            if (!userState) return;

            const state = JSON.parse(userState);
            
            if (state.transactions) {
                const transaction = state.transactions.find(t => t.id === requestId);
                if (transaction) {
                    transaction.status = status;
                }
            }
            
            localStorage.setItem('treasureFortuneState', JSON.stringify(state));
        }

        // Show toast
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <div>
                    <strong>${title}</strong>
                    <p style="font-size: 12px; opacity: 0.9;">${message}</p>
                </div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 4000);
        }
    </script>
</body>
</html>
